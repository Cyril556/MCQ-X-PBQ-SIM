<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CompTIA Security+ Practice Exam</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirect to index.html preserving the path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/MCQ-X-PBQ-SIM/' +
        '?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
